{% extends "stok/base.html" %}

{% block title %}{{ sayfa_basligi }}{% endblock %}

{% block content %}

<div class="dialog-card">

    <h1 class="dialog-title">
        {{ sayfa_basligi }}
    </h1>

    <form method="post">
        {% csrf_token %}

        {% for alan in form %}
            <div class="field">
                <label for="{{ alan.id_for_label }}">
                    {{ alan.label }}
                </label>

                {{ alan }}

                {% if alan.errors %}
                    {{ alan.errors }}
                {% endif %}
            </div>
        {% endfor %}

        <div class="dialog-actions">
            <button type="submit" class="btn">
                Kaydet
            </button>

            <a
                href="{% url 'stok:demo_cihazlar' %}"
                class="btn secondary"
            >
                İptal
            </a>
        </div>
    </form>

</div>

{% endblock %}
