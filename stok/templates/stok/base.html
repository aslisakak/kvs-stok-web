<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KVS Stok Takip Sistemi{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f4f4f4; color: #222; }
        .app-shell { min-height: 100vh; display: flex; }
        .sidebar { width: 220px; flex: 0 0 220px; min-height: 100vh; background: #e6e6e6; padding: 0 15px 22px; border-right: 1px solid #d0d0d0; }
        .brand { padding: 28px 0 24px; text-align: center; font-size: 24px; line-height: 1.15; font-weight: 700; }
        .menu-link { display: block; width: 100%; margin: 0 0 12px; padding: 12px 14px; border-radius: 7px; background: #3b8ed0; color: #fff; text-align: left; text-decoration: none; font-size: 15px; }
        .menu-link:hover, .menu-link.active { background: #1f6aa5; }
        .sidebar-bottom { margin-top: 28px; border-top: 1px solid #c8c8c8; padding-top: 18px; }
        .logout-form button { width: 100%; padding: 11px 14px; border: 0; border-radius: 7px; background: #707070; color: #fff; cursor: pointer; text-align: left; font-size: 15px; }
        .content { flex: 1; min-width: 0; padding: 22px 26px 28px; }
        .page-heading { text-align: center; margin: 2px 0 20px; font-size: 24px; font-weight: 700; }
        .panel { background: #e9e9e9; border-radius: 7px; padding: 12px; }
        .messages { margin-bottom: 12px; }
        .message { padding: 10px 13px; border-radius: 6px; background: #dff4e4; color: #1b6630; }
        .toolbar { display: flex; align-items: center; gap: 7px; padding: 10px; background: #e5e5e5; border-radius: 7px; margin-bottom: 12px; overflow-x: auto; }
        .search-form { display: flex; gap: 7px; min-width: 335px; flex: 1; }
        .search-input { width: 100%; min-width: 220px; padding: 10px 12px; border: 1px solid #b9b9b9; border-radius: 6px; background: #fff; font-size: 14px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; padding: 10px 12px; border: 0; border-radius: 6px; background: #3b8ed0; color: white; text-decoration: none; font-size: 14px; cursor: pointer; }
        .btn:hover { background: #1f6aa5; }
        .btn.secondary { background: #777; }
        .btn.danger { background: #c54545; }
        .btn:disabled, .btn.disabled { opacity: .45; pointer-events: none; }
        .table-wrap { overflow: auto; background: #fff; border: 1px solid #cfcfcf; }
        table { width: 100%; border-collapse: collapse; min-width: 760px; }
        th { padding: 12px 14px; background: #d9d9d9; border-right: 1px solid #c3c3c3; border-bottom: 1px solid #bdbdbd; text-align: left; font-size: 14px; }
        td { padding: 12px 14px; border-right: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; font-size: 14px; }
        tbody tr { cursor: pointer; background: white; }
        tbody tr.stokta-yok { background: #ffd6d6; }
        tbody tr:hover { filter: brightness(.97); }
        tbody tr.selected { outline: 2px solid #3b8ed0; outline-offset: -2px; }
        .dialog-card { width: min(430px, 100%); margin: 25px auto; padding: 25px 40px 30px; background: #e9e9e9; border-radius: 8px; }
        .dialog-title { margin: 0 0 20px; text-align: center; font-size: 22px; }
        .field { margin-bottom: 14px; }
        .field label { display: block; margin-bottom: 6px; font-size: 14px; }
        .field input { width: 100%; padding: 10px 12px; border: 1px solid #b9b9b9; border-radius: 6px; background: white; font-size: 14px; }
        .errorlist { margin: 6px 0 0; color: #a52828; font-size: 13px; }
        .dialog-actions { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .product-summary { text-align: center; margin-bottom: 18px; line-height: 1.65; }
        .empty { padding: 28px; text-align: center; color: #666; }
        @media (max-width: 850px) {
            .sidebar { width: 180px; flex-basis: 180px; }
            .content { padding: 18px 14px; }
            .toolbar { align-items: stretch; flex-wrap: wrap; }
            .search-form { min-width: 100%; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">KVS<br>STOK TAKİP</div>
        <a class="menu-link {% if aktif_menu == 'stoklar' %}active{% endif %}" href="{% url 'stok:urun_listesi' %}">📦 Stoklar</a>
        <a class="menu-link {% if aktif_menu == 'gonderiler' %}active{% endif %}" href="{% url 'stok:firma_gonderileri' %}">🚚 Firma Gönderileri</a>
        <a class="menu-link {% if aktif_menu == 'demo' %}active{% endif %}" href="{% url 'stok:demo_cihazlar' %}">🧪 Demo Cihazlar</a>
        <a class="menu-link {% if aktif_menu == 'sterisense' %}active{% endif %}" href="{% url 'stok:sterisense' %}">🌡️ Sterisense</a>
        <div class="sidebar-bottom">
            <form class="logout-form" method="post" action="{% url 'cikis' %}">
                {% csrf_token %}
                <button type="submit">Çıkış Yap</button>
            </form>
        </div>
    </aside>
    <main class="content">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}<div class="message">{{ message }}</div>{% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
