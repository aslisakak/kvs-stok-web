{% extends "stok/base.html" %}
{% block title %}{{ sayfa_basligi }} - KVS Stok Takip{% endblock %}
{% block content %}
<div class="dialog-card">
    <h1 class="dialog-title">{{ sayfa_basligi }}</h1>
    <form method="post">
        {% csrf_token %}
        {% for alan in form %}
            <div class="field">
                <label for="{{ alan.id_for_label }}">{{ alan.label }}</label>
                {{ alan }}
                {{ alan.errors }}
            </div>
        {% endfor %}
        <div class="dialog-actions">
            <button class="btn" type="submit">Kaydet</button>
            <a class="btn secondary" href="{% url 'stok:urun_listesi' %}">İptal</a>
        </div>
    </form>
</div>
{% endblock %}
