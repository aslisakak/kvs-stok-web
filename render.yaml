databases:
  - name: kvs-stok-db
    databaseName: kvs_stok
    user: kvs_stok
    plan: free

services:
  - type: web
    name: kvs-stok-web
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn kvs_stok_web.wsgi:application
    healthCheckPath: /giris/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kvs-stok-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.13.5"
